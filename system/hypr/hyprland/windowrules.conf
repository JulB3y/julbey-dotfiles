################
# WINDOW RULES #
################

windowrule {
  name = wifi-topbar
  match:title = wifi-topbar
  float = on 
  center = on
  size = 700 800
}

windowrule {
    name = btop
    match:title = btop
    float = on
    center = on
    size = 798 645
}

windowrule {
    name = tuxlauncher
    match:title = launcher
    float = on
    center = on
    size = 400 400
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
